AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  プリキュアオールスターズいえるかなクイズ - Backend API
  Session management and leaderboard system

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        TABLE_NAME: !Ref LeaderboardTable
        SITE_BUCKET: !Ref SiteBucketName
        SESSION_SECRET: !Ref SessionSecret
        CORS_ORIGIN: !Ref CorsOrigin

Parameters:
  SiteBucketName:
    Type: String
    Description: S3 bucket name for the site (used to write leaderboard.json)
  SessionSecret:
    Type: String
    Description: Secret key for HMAC session tokens (min 32 chars)
    NoEcho: true
  CorsOrigin:
    Type: String
    Description: Allowed CORS origin (e.g. https://example.com)
    Default: "*"
  AdminEmail:
    Type: String
    Description: Admin email address for rank-in notifications (empty to disable)
    Default: ""
  SenderEmail:
    Type: String
    Description: SES verified sender email address (empty to disable notifications)
    Default: ""

Resources:
  # --- CloudWatch Logs ---
  # API Gateway HTTP API のアクセスログ出力先（保持期間 90 日）
  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${HttpApi}/access-log"
      RetentionInDays: 90

  # Lambda 関数のログ出力先（保持期間 90 日）
  # 明示的に定義することで保持期間を制御（未定義の場合は Lambda が自動作成し永久保持）
  SessionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/allstars-session
      RetentionInDays: 90

  ScoreLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/allstars-score
      RetentionInDays: 90

  # --- API Gateway (HTTP API) ---
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      # アクセスログを CloudWatch Logs に出力（JSON 形式）
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","path":"$context.path","status":"$context.status","responseLength":"$context.responseLength","integrationLatency":"$context.integrationLatency","responseLatency":"$context.responseLatency","userAgent":"$context.identity.userAgent"}
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsOrigin
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
        MaxAge: 86400
      # スロットリングは API Gateway のデフォルト上限（10,000 rps）を利用
      # 必要に応じてAWSコンソールから個別に調整可能

  # --- Lambda: Session ---
  SessionFunction:
    Type: AWS::Serverless::Function
    DependsOn: SessionLogGroup
    Properties:
      FunctionName: allstars-session
      Handler: index.handler
      CodeUri: lambda/session/
      Events:
        GetSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/session
            Method: GET

  # --- Lambda: Score ---
  # ハイスコア送信は稀な操作のため、同時実行数を厳しく制限
  ScoreFunction:
    Type: AWS::Serverless::Function
    DependsOn: ScoreLogGroup
    Properties:
      FunctionName: allstars-score
      Handler: index.handler
      CodeUri: lambda/score/
      ReservedConcurrentExecutions: 2
      Environment:
        Variables:
          TABLE_NAME: !Ref LeaderboardTable
          SITE_BUCKET: !Ref SiteBucketName
          SESSION_SECRET: !Ref SessionSecret
          CORS_ORIGIN: !Ref CorsOrigin
          # ランクイン通知メールの設定（空文字の場合は通知無効）
          ADMIN_EMAIL: !Ref AdminEmail
          SENDER_EMAIL: !Ref SenderEmail
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
        - S3CrudPolicy:
            BucketName: !Ref SiteBucketName
        # SES によるランクイン通知メール送信権限
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        PostScore:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/score
            Method: POST

  # --- DynamoDB ---
  # pk="leaderboard" : ランキング本体（top20 配列 + clientInfo）
  # pk="audits"      : 監査ログ（logs 配列、最大100件、30日で除去）
  # pk="token:*"     : 使用済みトークン（TTL で自動削除）
  LeaderboardTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: allstars-leaderboard
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  LeaderboardTableName:
    Description: DynamoDB table name
    Value: !Ref LeaderboardTable
  # API Gateway アクセスログの出力先ロググループ名
  ApiAccessLogGroupName:
    Description: CloudWatch Logs group for API Gateway access logs
    Value: !Ref ApiAccessLogGroup
